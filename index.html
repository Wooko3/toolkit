<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Artwork Generator</title>

  <link rel="icon" type="image/png" href="favicon.png" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/cropperjs@1.5.13/dist/cropper.min.css" rel="stylesheet"/>

  <style>
    :root {
      --bg: #0a0f0d;
      --bg-2: #0f1714;
      --panel: rgba(18, 26, 23, 0.85);
      --panel-2: rgba(22, 32, 28, 0.95);
      --border: rgba(255,255,255,0.08);
      --text: #eef4f1;
      --muted: #8fa39a;
      --primary: #7fa89b;
      --primary-2: #a8c3b5;
      --primary-hover: #6f978a;
      --success: #5bbd8a;
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
      --radius: 22px;
      --input-bg: rgba(255,255,255,0.04);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(127,168,155,0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(168,195,181,0.12), transparent 28%),
        linear-gradient(180deg, #0a0f0d 0%, #0c1411 100%);
    }

    body {
      padding: 24px;
    }

    .app {
      max-width: 1480px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .left-panel {
      padding: 24px;
      position: sticky;
      top: 24px;
    }

    .right-panel {
      padding: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .brand img {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      flex-shrink: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-btn:hover {
      border-color: rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.05);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #7fa89b 0%, #a8c3b5 100%);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 10px 24px rgba(127,168,155,0.35);
    }

    .section {
      margin-bottom: 18px;
    }

    .section label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #dfe7f2;
      letter-spacing: 0.01em;
    }

    input[type="text"] {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      background: var(--input-bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    input[type="text"]::placeholder {
      color: #7f8ca1;
    }

    input[type="text"]:focus {
      border-color: rgba(127,168,155,0.6);
      background: rgba(255,255,255,0.06);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--primary);
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .hidden {
      display: none !important;
    }

    .btn {
      width: 100%;
      border: none;
      color: #fff;
      padding: 14px 18px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn.primary {
      background: linear-gradient(135deg, #7fa89b 0%, #a8c3b5 100%);
      box-shadow: 0 12px 28px rgba(127,168,155,0.35);
    }

    .btn.primary:hover {
      opacity: 0.96;
    }

    .btn.secondary {
      background: linear-gradient(135deg, #152033 0%, #1d2940 100%);
      border: 1px solid var(--border);
      box-shadow: 0 12px 28px rgba(0,0,0,0.18);
    }

    .btn.success {
      background: linear-gradient(135deg, #5bbd8a 0%, #3ea971 100%);
      box-shadow: 0 12px 28px rgba(91,189,138,0.26);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0 6px;
    }

    .toggle-row span {
      font-size: 14px;
      font-weight: 600;
      color: #dfe7f2;
    }

    .right-panel h2 {
      margin: 0 0 18px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .workspace-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      background: var(--panel-2);
      min-height: 600px;
    }

    .workspace-card h3 {
      margin: 0 0 14px;
      font-size: 16px;
      font-weight: 800;
      color: #f2f6fb;
    }

    .preview-wrap {
      position: relative;
      width: 100%;
      min-height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.015)),
        #0d131f;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    #previewImage {
      max-width: 100%;
      display: none;
    }

    #finalPreview {
      width: 100%;
      display: none;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fff;
    }

    .preview-placeholder {
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      line-height: 1.6;
      max-width: 280px;
      padding: 20px;
    }

    #downloadBtn {
      margin-top: 16px;
      display: none;
    }

    .upload-stack {
      display: grid;
      gap: 12px;
    }

    .subtle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    canvas {
      display: none;
    }

    @media (max-width: 1100px) {
      .app {
        grid-template-columns: 1fr;
      }

      .left-panel {
        position: static;
      }

      .workspace {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel left-panel">
      <div class="brand">
        <img src="ofam-header.jpg" alt="Header" onerror="this.style.display='none'">
        <h1>Artwork Generator</h1>
      </div>

      <div class="tabs">
        <button class="tab-btn active" id="tabOfamBtn" type="button">Only For A Moment</button>
        <button class="tab-btn" id="tabSunbeamBtn" type="button">Sunbeam</button>
      </div>

      <div class="section">
        <label>Artwork</label>
        <div class="upload-stack">
          <button class="btn secondary" id="uploadBtn" type="button">Upload Artwork</button>
          <input type="file" id="fileInput" accept="image/*" class="hidden" />
        </div>
      </div>

      <div id="ofamControls">
        <div class="section">
          <label for="ofamArtist">Artist name</label>
          <input type="text" id="ofamArtist" placeholder="Artist name" />
        </div>
        <div class="section">
          <label for="ofamTitle">Track title</label>
          <input type="text" id="ofamTitle" placeholder="Track title" />
        </div>
        <div class="section">
          <div class="toggle-row">
            <span>Apply grain</span>
            <input type="checkbox" id="ofamNoiseToggle" />
          </div>
          <label for="ofamNoiseAmount">Grain amount</label>
          <input type="range" id="ofamNoiseAmount" min="0" max="40" value="12" />
        </div>
      </div>

      <div id="sunbeamControls" class="hidden">
        <div class="section">
          <label for="sunbeamArtist">Artist name</label>
          <input type="text" id="sunbeamArtist" placeholder="Artist name" />
        </div>
        <div class="section">
          <label for="sunbeamTitle">Track title</label>
          <input type="text" id="sunbeamTitle" placeholder="Track title" />
        </div>
        <div class="section">
          <label for="sunbeamCatalogue">Catalogue number</label>
          <input type="text" id="sunbeamCatalogue" placeholder="SUN001" />
        </div>
        <div class="section">
          <div class="toggle-row">
            <span>Apply grain</span>
            <input type="checkbox" id="sunbeamNoiseToggle" />
          </div>
          <label for="sunbeamNoiseAmount">Grain amount</label>
          <input type="range" id="sunbeamNoiseAmount" min="0" max="40" value="12" />
        </div>
      </div>

      <button class="btn primary" id="generateBtn" type="button">Generate Artwork</button>
    </div>

    <div class="panel right-panel">
      <h2>Preview</h2>

      <div class="workspace">
        <div class="workspace-card">
          <h3>Crop Preview</h3>
          <div class="preview-wrap">
            <img id="previewImage" alt="Preview" />
            <div class="preview-placeholder" id="cropPlaceholder">
              Upload an image to begin.<br>
              Then position it within the crop area before generating.
            </div>
          </div>
        </div>

        <div class="workspace-card">
          <h3>Final Artwork</h3>
          <img id="finalPreview" alt="Final artwork preview" />
          <div class="preview-placeholder" id="finalPlaceholder">
            Your finished artwork will appear here.
          </div>
          <button class="btn success" id="downloadBtn" type="button">Download Artwork</button>
        </div>
      </div>
    </div>
  </div>

  <canvas id="canvas" width="3000" height="3000"></canvas>

  <script src="https://unpkg.com/cropperjs@1.5.13/dist/cropper.min.js"></script>
  <script>
    const TABS = {
      OFAM: 'ofam',
      SUNBEAM: 'sunbeam'
    };

    // Bump this if the browser keeps showing an old overlay
    const ASSET_VERSION = 'sunbeam-v2';

    let activeTab = TABS.OFAM;
    let cropper = null;
    let lastOutputDataUrl = '';

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const tabOfamBtn = document.getElementById('tabOfamBtn');
    const tabSunbeamBtn = document.getElementById('tabSunbeamBtn');

    const ofamControls = document.getElementById('ofamControls');
    const sunbeamControls = document.getElementById('sunbeamControls');

    const uploadBtn = document.getElementById('uploadBtn');
    const fileInput = document.getElementById('fileInput');
    const previewImage = document.getElementById('previewImage');
    const cropPlaceholder = document.getElementById('cropPlaceholder');

    const finalPreview = document.getElementById('finalPreview');
    const finalPlaceholder = document.getElementById('finalPlaceholder');
    const downloadBtn = document.getElementById('downloadBtn');

    const ofamArtist = document.getElementById('ofamArtist');
    const ofamTitle = document.getElementById('ofamTitle');
    const ofamNoiseToggle = document.getElementById('ofamNoiseToggle');
    const ofamNoiseAmount = document.getElementById('ofamNoiseAmount');

    const sunbeamArtist = document.getElementById('sunbeamArtist');
    const sunbeamTitle = document.getElementById('sunbeamTitle');
    const sunbeamCatalogue = document.getElementById('sunbeamCatalogue');
    const sunbeamNoiseToggle = document.getElementById('sunbeamNoiseToggle');
    const sunbeamNoiseAmount = document.getElementById('sunbeamNoiseAmount');

    const generateBtn = document.getElementById('generateBtn');

    const SUNBEAM_IMAGE_FRAME = {
      x: 0,
      y: 0,
      width: 2000,
      height: 3000
    };

    const SUNBEAM_CROP_RATIO = 2000 / 3000;

    // Right panel starts at x = 2000, with 100px padding
    const SUNBEAM_TEXT = {
      x: 2100,
      artistY: 980,
      titleY: 1055,
      catalogueY: 2900
    };

    function setActiveTab(tab) {
      activeTab = tab;

      tabOfamBtn.classList.toggle('active', tab === TABS.OFAM);
      tabSunbeamBtn.classList.toggle('active', tab === TABS.SUNBEAM);

      ofamControls.classList.toggle('hidden', tab !== TABS.OFAM);
      sunbeamControls.classList.toggle('hidden', tab !== TABS.SUNBEAM);

      if (cropper && previewImage.src) {
        rebuildCropper();
      }
    }

    tabOfamBtn.addEventListener('click', () => setActiveTab(TABS.OFAM));
    tabSunbeamBtn.addEventListener('click', () => setActiveTab(TABS.SUNBEAM));

    uploadBtn.addEventListener('click', () => fileInput.click());

    function getAspectRatioForTab() {
      return activeTab === TABS.OFAM ? 1 : SUNBEAM_CROP_RATIO;
    }

    function rebuildCropper() {
      if (!previewImage.src) return;

      if (cropper) {
        cropper.destroy();
        cropper = null;
      }

      cropper = new Cropper(previewImage, {
        aspectRatio: getAspectRatioForTab(),
        viewMode: 1,
        autoCropArea: 1,
        movable: true,
        zoomable: true,
        scalable: false,
        cropBoxResizable: true,
        background: false,
        responsive: true
      });
    }

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;

      const url = URL.createObjectURL(file);
      previewImage.src = url;
      previewImage.style.display = 'block';
      cropPlaceholder.style.display = 'none';

      previewImage.onload = () => {
        rebuildCropper();
      };
    });

    function sanitizeFilename(name) {
      return (name || 'final_artwork')
        .replace(/[<>:"/\\|?*\x00-\x1F]/g, '')
        .trim() || 'final_artwork';
    }

    function drawSpacedText(ctx, text, x, y, spacing, font, align = 'center') {
      if (!text) return;

      ctx.font = font;
      ctx.textBaseline = 'alphabetic';
      ctx.textAlign = 'left';

      const chars = [...text];
      let totalWidth = 0;

      for (const char of chars) {
        totalWidth += ctx.measureText(char).width;
      }
      totalWidth += spacing * (chars.length - 1);

      let startX = align === 'center' ? x - totalWidth / 2 : x;

      for (const char of chars) {
        const width = ctx.measureText(char).width;
        ctx.fillText(char, startX, y);
        startX += width + spacing;
      }
    }

    async function loadImage(src, bustCache = false) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;

        if (src.startsWith('data:')) {
          img.src = src;
        } else {
          img.src = bustCache ? `${src}?v=${ASSET_VERSION}` : src;
        }
      });
    }

    async function ensureFontsLoaded() {
      await document.fonts.load('500 60px "Manrope"');
      await document.fonts.load('800 60px "Manrope"');
      await document.fonts.load('500 42px "Manrope"');
      await document.fonts.load('800 76px "Manrope"');
      await document.fonts.load('500 36px "Manrope"');
      await document.fonts.ready;
    }

    function rgbToHsl(r, g, b) {
      r /= 255;
      g /= 255;
      b /= 255;

      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      let h, s;
      const l = (max + min) / 2;

      if (max === min) {
        h = s = 0;
      } else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);

        switch (max) {
          case r:
            h = (g - b) / d + (g < b ? 6 : 0);
            break;
          case g:
            h = (b - r) / d + 2;
            break;
          default:
            h = (r - g) / d + 4;
        }

        h /= 6;
      }

      return {
        h: Math.round(h * 360),
        s: Math.round(s * 100),
        l: Math.round(l * 100)
      };
    }

    function hslToCss(h, s, l) {
      return `hsl(${h} ${s}% ${l}%)`;
    }

    function extractAverageColor(sourceCanvas) {
      const sampleCanvas = document.createElement('canvas');
      const sampleCtx = sampleCanvas.getContext('2d');

      const sampleWidth = 80;
      const sampleHeight = 80;
      sampleCanvas.width = sampleWidth;
      sampleCanvas.height = sampleHeight;

      sampleCtx.drawImage(sourceCanvas, 0, 0, sampleWidth, sampleHeight);
      const imageData = sampleCtx.getImageData(0, 0, sampleWidth, sampleHeight).data;

      let r = 0, g = 0, b = 0, count = 0;

      for (let i = 0; i < imageData.length; i += 4) {
        const alpha = imageData[i + 3];
        if (alpha < 10) continue;

        r += imageData[i];
        g += imageData[i + 1];
        b += imageData[i + 2];
        count++;
      }

      if (!count) {
        return {
          base: 'rgb(220, 210, 200)',
          light: 'hsl(35 35% 88%)',
          dark: 'hsl(8 68% 24%)'
        };
      }

      r = Math.round(r / count);
      g = Math.round(g / count);
      b = Math.round(b / count);

      const hsl = rgbToHsl(r, g, b);

      const light = hslToCss(
        hsl.h,
        Math.max(18, Math.min(45, Math.round(hsl.s * 0.45))),
        88
      );

      const dark = hslToCss(
        hsl.h,
        Math.max(28, Math.min(75, Math.round(hsl.s * 0.95))),
        24
      );

      return {
        base: `rgb(${r}, ${g}, ${b})`,
        light,
        dark
      };
    }

    function tintImage(image, color, width = 3000, height = 3000) {
      const tempCanvas = document.createElement('canvas');
      const tempCtx = tempCanvas.getContext('2d');
      tempCanvas.width = width;
      tempCanvas.height = height;

      tempCtx.drawImage(image, 0, 0, width, height);
      tempCtx.globalCompositeOperation = 'source-atop';
      tempCtx.fillStyle = color;
      tempCtx.fillRect(0, 0, width, height);
      tempCtx.globalCompositeOperation = 'source-over';

      return tempCanvas;
    }

    function applyNoise(ctx, width, height, strength = 12) {
      const imageData = ctx.getImageData(0, 0, width, height);
      const data = imageData.data;

      for (let i = 0; i < data.length; i += 4) {
        const noise = (Math.random() - 0.5) * strength;
        data[i] = Math.max(0, Math.min(255, data[i] + noise));
        data[i + 1] = Math.max(0, Math.min(255, data[i + 1] + noise));
        data[i + 2] = Math.max(0, Math.min(255, data[i + 2] + noise));
      }

      ctx.putImageData(imageData, 0, 0);
    }

    async function generateOFAM() {
      const croppedCanvas = cropper.getCroppedCanvas({
        width: 3000,
        height: 3000
      });

      const artwork = await loadImage(croppedCanvas.toDataURL('image/png'));
      const overlay = await loadImage('ofam-art-overlay.png', true);

      ctx.clearRect(0, 0, 3000, 3000);
      ctx.drawImage(artwork, 0, 0, 3000, 3000);
      ctx.drawImage(overlay, 0, 0, 3000, 3000);

      await ensureFontsLoaded();

      ctx.fillStyle = '#000000';

      drawSpacedText(
        ctx,
        ofamArtist.value,
        450,
        1486,
        6,
        '500 60px "Manrope", sans-serif',
        'center'
      );

      drawSpacedText(
        ctx,
        ofamTitle.value,
        450,
        1558,
        6,
        '800 60px "Manrope", sans-serif',
        'center'
      );

      if (ofamNoiseToggle.checked) {
        applyNoise(ctx, 3000, 3000, parseInt(ofamNoiseAmount.value, 10));
      }

      return sanitizeFilename(ofamTitle.value || 'ofam-artwork') + '.jpg';
    }

    async function generateSunbeam() {
      const croppedCanvas = cropper.getCroppedCanvas({
        width: SUNBEAM_IMAGE_FRAME.width,
        height: SUNBEAM_IMAGE_FRAME.height
      });

      const colors = extractAverageColor(croppedCanvas);

      const artwork = await loadImage(croppedCanvas.toDataURL('image/png'));
      const bgOverlay = await loadImage('sunbeam-art-overlay.png', true);
      const logoOverlay = await loadImage('sunbeam-art-logo.png', true);

      const tintedBg = tintImage(bgOverlay, colors.light);
      const tintedLogo = tintImage(logoOverlay, colors.dark);

      ctx.clearRect(0, 0, 3000, 3000);
      ctx.fillStyle = colors.light;
      ctx.fillRect(0, 0, 3000, 3000);

      ctx.drawImage(
        artwork,
        SUNBEAM_IMAGE_FRAME.x,
        SUNBEAM_IMAGE_FRAME.y,
        SUNBEAM_IMAGE_FRAME.width,
        SUNBEAM_IMAGE_FRAME.height
      );

      ctx.drawImage(tintedBg, 0, 0, 3000, 3000);
      ctx.drawImage(tintedLogo, 0, 0, 3000, 3000);

      await ensureFontsLoaded();

      ctx.fillStyle = colors.dark;

      drawSpacedText(
        ctx,
        sunbeamArtist.value,
        SUNBEAM_TEXT.x,
        SUNBEAM_TEXT.artistY,
        1.4,
        '500 42px "Manrope", sans-serif',
        'left'
      );

      drawSpacedText(
        ctx,
        sunbeamTitle.value,
        SUNBEAM_TEXT.x,
        SUNBEAM_TEXT.titleY,
        1.3,
        '800 76px "Manrope", sans-serif',
        'left'
      );

      drawSpacedText(
        ctx,
        sunbeamCatalogue.value,
        SUNBEAM_TEXT.x,
        SUNBEAM_TEXT.catalogueY,
        1.2,
        '500 46px "Manrope", sans-serif',
        'left'
      );

      if (sunbeamNoiseToggle.checked) {
        applyNoise(ctx, 3000, 3000, parseInt(sunbeamNoiseAmount.value, 10));
      }

      return sanitizeFilename(sunbeamTitle.value || 'sunbeam-artwork') + '.jpg';
    }

    async function generateArtwork() {
      if (!cropper) {
        alert('Please upload and crop an image first.');
        return;
      }

      let filename = 'final_artwork.jpg';

      if (activeTab === TABS.OFAM) {
        filename = await generateOFAM();
      } else {
        filename = await generateSunbeam();
      }

      lastOutputDataUrl = canvas.toDataURL('image/jpeg', 0.92);
      finalPreview.src = lastOutputDataUrl;
      finalPreview.style.display = 'block';
      finalPlaceholder.style.display = 'none';
      downloadBtn.style.display = 'inline-block';
      downloadBtn.dataset.filename = filename;
    }

    function downloadArtwork() {
      if (!lastOutputDataUrl) return;

      const link = document.createElement('a');
      link.href = lastOutputDataUrl;
      link.download = downloadBtn.dataset.filename || 'final_artwork.jpg';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    generateBtn.addEventListener('click', generateArtwork);
    downloadBtn.addEventListener('click', downloadArtwork);
  </script>
</body>
</html>
